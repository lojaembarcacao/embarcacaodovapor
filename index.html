<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Embarcação do Vapor</title>
<link rel="icon" type="image/png" href="./img/logo.png">

<style>
:root{ 
  --yellow:#ffd500;
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:#000;
}

/* ===== FIX MOBILE CLIQUE ===== */
button, .btn, .buy-btn, .btn-top{
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

html.cart-open, body.cart-open{
  overflow: hidden !important;
}

/* ===== MODAL 18+ ===== */
.age-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.85);
  z-index:9999;
}
.age-modal.show{display:flex}

.age-box{
  background:#111;
  padding:20px;
  border-radius:16px;
  text-align:center;
  width:90%;
  max-width:400px;
}

.age-box button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-yes{background:var(--yellow);color:#000;}
.btn-no{background:#333;color:#fff;}

/* HEADER */
header{
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header strong{color:var(--yellow);}

.btn-top{
  padding:10px 12px;
  border-radius:10px;
  border:none;
  background:var(--yellow);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* PRODUTOS */
.section{padding:20px;}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.product{
  background:#111;
  padding:15px;
  border-radius:14px;
  text-align:center;
}

.product img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.price{
  color:var(--yellow);
  font-size:20px;
  font-weight:bold;
}

.buy-btn{
  width:100%;
  padding:12px;
  background:var(--yellow);
  color:#000;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* CARRINHO */
.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  z-index:300;
}
.drawer{
  position:fixed;
  right:0;
  top:0;
  height:100vh;
  width:90%;
  max-width:400px;
  background:#111;
  transform:translateX(100%);
  transition:.3s;
  z-index:350;
  display:flex;
  flex-direction:column;
}
.drawer.open{transform:translateX(0);}
.drawer-overlay.open{display:block;}

.drawer-body{
  flex:1;
  overflow:auto;
  padding:15px;
}

.drawer-footer{
  padding:15px;
  border-top:1px solid #222;
}

.drawer-footer button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
}

.cart-total{
  display:flex;
  justify-content:space-between;
  font-size:18px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="ageModal" class="age-modal">
  <div class="age-box">
    <h2>Você tem mais de 18 anos?</h2>
    <button class="btn-yes" onclick="acceptAge()">Sim, tenho 18+</button>
    <button class="btn-no" onclick="rejectAge()">Não</button>
  </div>
</div>

<header>
  <strong>EMBARCAÇÃO DO VAPOR</strong>
  <button class="btn-top" onclick="openCart()">Carrinho</button>
</header>

<section class="section">
  <div class="products" id="products"></div>
</section>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>

<aside class="drawer" id="drawer">
  <div class="drawer-body" id="cartItems"></div>
  <div class="drawer-footer">
    <div class="cart-total">
      <span>Total</span>
      <span>R$ <span id="modalTotal">0.00</span></span>
    </div>
    <button style="background:var(--yellow);color:#000;" onclick="sendWhats()">Finalizar no WhatsApp</button>
    <button style="background:#333;color:#fff;" onclick="clearCart()">Limpar carrinho</button>
  </div>
</aside>

<script>
const phone = "5562982017808";

const products = [
  { n: "BlackSheep 30k", p: 120, img: "./img/blacksheep-30k.png" },
  { n: "Elfbar TE 30k", p: 125, img: "./img/elfbar-te-30k.png" },
  { n: "Ignite V150", p: 115, img: "./img/ignite-v150.png" }
];

let cart = {};

function renderProducts(){
  const grid = document.getElementById("products");
  grid.innerHTML = "";
  products.forEach((p, index)=>{
    grid.innerHTML += `
      <div class="product">
        <img src="${p.img}" onerror="this.src='./img/logo.png'">
        <h3>${p.n}</h3>
        <div class="price">R$ ${p.p.toFixed(2)}</div>
        <button class="buy-btn" onclick="add(${index})">Adicionar</button>
      </div>
    `;
  });
}

function add(index){
  const p = products[index];
  if(cart[p.n]) cart[p.n].qty++;
  else cart[p.n] = { ...p, qty:1 };
  update();
}

function update(){
  const list = document.getElementById("cartItems");
  const items = Object.values(cart);
  let total = 0;
  list.innerHTML = "";
  items.forEach(item=>{
    total += item.p * item.qty;
    list.innerHTML += `
      <div>
        ${item.n} x${item.qty}
        <strong>R$ ${(item.p * item.qty).toFixed(2)}</strong>
      </div>
    `;
  });
  document.getElementById("modalTotal").innerText = total.toFixed(2);
}

function clearCart(){
  cart = {};
  update();
}

function openCart(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
  document.documentElement.classList.add("cart-open");
  document.body.classList.add("cart-open");
}

function closeCart(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
  document.documentElement.classList.remove("cart-open");
  document.body.classList.remove("cart-open");
}

function sendWhats(){
  const items = Object.values(cart);
  if(items.length === 0){ alert("Carrinho vazio"); return; }

  let msg = "🛒 NOVO PEDIDO\n\n";
  let total = 0;

  items.forEach(item=>{
    const subtotal = item.p * item.qty;
    total += subtotal;
    msg += `${item.n}\nQtd: ${item.qty}\nSubtotal: R$ ${subtotal.toFixed(2)}\n\n`;
  });

  msg += `Total: R$ ${total.toFixed(2)}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

/* Modal 18+ */
const AGE_KEY="age_ok_v2";
function acceptAge(){
  localStorage.setItem(AGE_KEY,"1");
  document.getElementById("ageModal").classList.remove("show");
}
function rejectAge(){ window.location.href="https://google.com"; }
if(localStorage.getItem(AGE_KEY)!=="1"){
  document.getElementById("ageModal").classList.add("show");
}

renderProducts();
</script>

</body>
</html>
